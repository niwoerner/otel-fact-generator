services:
  frontend:
    build: ./frontend
    ports:
      - "4000:3000"
    environment:
      - CONTEXT_FETCHER_URL=http://context-fetcher:8080
      - OTEL_SERVICE_NAME=frontend
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    depends_on:
      - context-fetcher
      - otel-collector

  context-fetcher:
    build: ./context-fetcher
    environment:
      - FACT_GENERATOR_URL=http://fact-generator:5000
      - OTEL_SERVICE_NAME=context-fetcher
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    depends_on:
      - fact-generator
      - otel-collector

  fact-generator:
    build: ./fact-generator
    env_file:
      - .env
    environment:
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - OTEL_SERVICE_NAME=fact-generator
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  jaeger:
    image: jaegertracing/all-in-one:1.46
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
